    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react">
        import React, { useState, useMemo } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        // เพิ่ม LineChart, Line เข้ามาสำหรับการแสดงผลกราฟแนวโน้ม
        import { 
            BarChart, Bar, LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer,
            RadarChart, PolarGrid, PolarAngleAxis, PolarRadiusAxis, Radar, Cell 
        } from 'https://esm.sh/recharts@2.12.2?deps=react@18.2.0,react-dom@18.2.0';
        
        // --- Icon Components ---
        const IconUsers = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>

        const IconStar = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>

        const IconTrendingUp = ({ className }) => (

        const IconBookOpen = ({ className }) => (

        );
        const IconSmartphone = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
        );
        const IconActivity = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        );
        const IconPieChart = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
        );
        const IconLink = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        );
        const IconClipboardList = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg>
        );

        // --- 1. โครงสร้างข้อมูลคำถาม ---
        const questionsConfig = [
            { id: '1.1', text: 'การใช้งานง่าย ไม่ซับซ้อน', category: 'ด้านผลิตภัณฑ์' },
            { id: '1.2', text: 'การวางตำแหน่งข้อมูลต่างๆ บนหน้าจอ', category: 'ด้านผลิตภัณฑ์' },
            { id: '2.1', text: 'การติดตั้งแอปพลิเคชันที่ไม่ยุ่งยาก', category: 'ด้านกระบวนการบริการ' },
            { id: '2.2', text: 'การดูข้อมูลต่างๆ ของ ศพด.', category: 'ด้านกระบวนการบริการ' },
            { id: '2.3', text: 'การเข้าดูบทเรียน/ดาวน์โหลด/ส่งงาน', category: 'ด้านกระบวนการบริการ' },
            { id: '2.4', text: 'การเข้าดูรายงานผลพัฒนาการ', category: 'ด้านกระบวนการบริการ' },
            { id: '3.1', text: 'การประชาสัมพันธ์ให้ใช้งานแอปฯ', category: 'ด้านการส่งเสริมการใช้งาน' },
            { id: '3.2', text: 'คู่มือการใช้งาน', category: 'ด้านการส่งเสริมการใช้งาน' },
            { id: '4.1', text: 'ความพึงพอใจภาพรวมต่อแอปฯ', category: 'ด้านความพึงพอใจภาพรวม' },
        ];

        // --- 2. ข้อมูลดิบ ---
        const rawData = {
            '2564': {
                respondents: 39,
                scores: {
                    '1.1': { 5: 28, 4: 11, 3: 0, 2: 0, 1: 0 },
                    '1.2': { 5: 34, 4: 5, 3: 0, 2: 0, 1: 0 },
                    '2.1': { 5: 28, 4: 11, 3: 0, 2: 0, 1: 0 },
                    '2.2': { 5: 34, 4: 5, 3: 0, 2: 0, 1: 0 },
                    '2.3': { 5: 31, 4: 8, 3: 0, 2: 0, 1: 0 },
                    '2.4': { 5: 31, 4: 8, 3: 0, 2: 0, 1: 0 },
                    '3.1': { 5: 31, 4: 8, 3: 0, 2: 0, 1: 0 },
                    '3.2': { 5: 34, 4: 5, 3: 0, 2: 0, 1: 0 },
                    '4.1': { 5: 31, 4: 8, 3: 0, 2: 0, 1: 0 },
                }
            },
            '2565': {
                respondents: 40,
                scores: {
                    '1.1': { 5: 31, 4: 9, 3: 0, 2: 0, 1: 0 },
                    '1.2': { 5: 36, 4: 4, 3: 0, 2: 0, 1: 0 },
                    '2.1': { 5: 29, 4: 11, 3: 0, 2: 0, 1: 0 },
                    '2.2': { 5: 36, 4: 4, 3: 0, 2: 0, 1: 0 },
                    '2.3': { 5: 34, 4: 6, 3: 0, 2: 0, 1: 0 },
                    '2.4': { 5: 36, 4: 4, 3: 0, 2: 0, 1: 0 },
                    '3.1': { 5: 33, 4: 7, 3: 0, 2: 0, 1: 0 },
                    '3.2': { 5: 35, 4: 5, 3: 0, 2: 0, 1: 0 },
                    '4.1': { 5: 33, 4: 7, 3: 0, 2: 0, 1: 0 },
                }
            },
            '2566': {
                respondents: 39,
                scores: {
                    '1.1': { 5: 32, 4: 7, 3: 0, 2: 0, 1: 0 },
                    '1.2': { 5: 34, 4: 5, 3: 0, 2: 0, 1: 0 },
                    '2.1': { 5: 30, 4: 9, 3: 0, 2: 0, 1: 0 },
                    '2.2': { 5: 34, 4: 5, 3: 0, 2: 0, 1: 0 },
                    '2.3': { 5: 33, 4: 6, 3: 0, 2: 0, 1: 0 },
                    '2.4': { 5: 34, 4: 5, 3: 0, 2: 0, 1: 0 },
                    '3.1': { 5: 34, 4: 5, 3: 0, 2: 0, 1: 0 },
                    '3.2': { 5: 33, 4: 6, 3: 0, 2: 0, 1: 0 },
                    '4.1': { 5: 34, 4: 5, 3: 0, 2: 0, 1: 0 },
                }
            },
            '2567': {
                respondents: 16,
                scores: {
                    '1.1': { 5: 15, 4: 1, 3: 0, 2: 0, 1: 0 },
                    '1.2': { 5: 15, 4: 1, 3: 0, 2: 0, 1: 0 },
                    '2.1': { 5: 14, 4: 2, 3: 0, 2: 0, 1: 0 },
                    '2.2': { 5: 14, 4: 2, 3: 0, 2: 0, 1: 0 },
                    '2.3': { 5: 14, 4: 2, 3: 0, 2: 0, 1: 0 },
                    '2.4': { 5: 15, 4: 1, 3: 0, 2: 0, 1: 0 },
                    '3.1': { 5: 15, 4: 1, 3: 0, 2: 0, 1: 0 },
                    '3.2': { 5: 14, 4: 1, 3: 0, 2: 0, 1: 0 },
                    '4.1': { 5: 15, 4: 1, 3: 0, 2: 0, 1: 0 },
                }
            }
        };

        const COLORS = {
            'ด้านผลิตภัณฑ์': '#4F46E5', 
            'ด้านกระบวนการบริการ': '#06B6D4', 
            'ด้านการส่งเสริมการใช้งาน': '#10B981', 
            'ด้านความพึงพอใจภาพรวม': '#F59E0B', 
        };

        const LINE_COLORS = ['#EF4444', '#F59E0B', '#10B981', '#3B82F6', '#6366F1'];

        // Helper function to calculate mean for a single question response
        const calculateMean = (scores, n) => {
            if (!scores || !n) return 0;
            const sum = (scores[5]*5) + (scores[4]*4) + (scores[3]*3) + (scores[2]*2) + (scores[1]*1);
            return sum / n;
        };

        const Dashboard = () => {
            const [viewMode, setViewMode] = useState('year'); // 'year' | 'overview'
            const [selectedYear, setSelectedYear] = useState('2567');

            // --- Yearly Statistics Calculation (Original Logic) ---
            const yearlyStats = useMemo(() => {
                const yearData = rawData[selectedYear];
                if (!yearData) return null;

                let totalScoreSum = 0;
                let totalItems = 0;
                
                const itemStats = questionsConfig.map(q => {
                    const s = yearData.scores[q.id] || { 5: 0, 4: 0, 3: 0, 2: 0, 1: 0 };
                    const n = yearData.respondents;
                    
                    const mean = calculateMean(s, n);

                    // SD Calculation
                    const sumSq = (s[5]*25) + (s[4]*16) + (s[3]*9) + (s[2]*4) + (s[1]*1);
                    const variance = (sumSq - (n * mean * mean)) / (n - 1);
                    const sd = Math.sqrt(variance);

                    let interpret = '';
                    if (mean >= 4.50) interpret = 'มากที่สุด';
                    else if (mean >= 3.50) interpret = 'มาก';
                    else if (mean >= 2.50) interpret = 'ปานกลาง';
                    else if (mean >= 1.50) interpret = 'ค่อนข้างน้อย';
                    else interpret = 'น้อย';

                    totalScoreSum += mean;
                    totalItems++;

                    return { ...q, mean, sd, interpret, breakdown: s };
                });

                // Category Stats
                const categories = ['ด้านผลิตภัณฑ์', 'ด้านกระบวนการบริการ', 'ด้านการส่งเสริมการใช้งาน', 'ด้านความพึงพอใจภาพรวม'];
                const categoryStats = categories.map(cat => {
                    const itemsInCat = itemStats.filter(i => i.category === cat);
                    const avgMean = itemsInCat.reduce((acc, curr) => acc + curr.mean, 0) / itemsInCat.length;
                    return { name: cat, avg: avgMean, fullMark: 5 };
                });

                const overallMean = totalScoreSum / totalItems;

                return { respondents: yearData.respondents, overallMean, itemStats, categoryStats };
            }, [selectedYear]);

            // --- Overview Statistics Calculation (New Logic) ---
            const overviewStats = useMemo(() => {
                const years = ['2566', '2567'];
                const availableYears = years.filter(y => rawData[y] !== null);
                
                // 1. Prepare Data for Line Chart (Overall & Category Trends)
                const trendData = availableYears.map(year => {
                    const yearData = rawData[year];
                    const n = yearData.respondents;
                    let yearSumMean = 0;
                    let yearItemCount = 0;

                    const catSums = {};
                    const catCounts = {};

                    questionsConfig.forEach(q => {
                        const s = yearData.scores[q.id];
                        const mean = calculateMean(s, n);
                        yearSumMean += mean;
                        yearItemCount++;

                        if (!catSums[q.category]) { catSums[q.category] = 0; catCounts[q.category] = 0; }
                        catSums[q.category] += mean;
                        catCounts[q.category]++;
                    });

                    const result = { year };
                    // Category Means
                    Object.keys(catSums).forEach(cat => {
                        result[cat] = catSums[cat] / catCounts[cat];
                    });
                    // Overall Mean
                    result['ภาพรวม'] = yearSumMean / yearItemCount;
                    result['respondents'] = n;
                    return result;
                });

                // 2. Aggregated Stats (Summing responses across all available years first, to get true pooled mean)
                const aggregatedTable = questionsConfig.map(q => {
                    const row = { id: q.id, text: q.text, category: q.category, scores: {5:0, 4:0, 3:0, 2:0, 1:0}, totalN: 0 };
                    availableYears.forEach(year => {
                        const s = rawData[year].scores[q.id];
                        row.scores[5] += s[5] || 0;
                        row.scores[4] += s[4] || 0;
                        row.scores[3] += s[3] || 0;
                        row.scores[2] += s[2] || 0;
                        row.scores[1] += s[1] || 0;
                        row.totalN += rawData[year].respondents;
                    });

                    // คิดค่าเฉลี่ยจากฐานคนตอบรวมทั้งหมด (Pooled Mean)
                    const sum = (row.scores[5]*5) + (row.scores[4]*4) + (row.scores[3]*3) + (row.scores[2]*2) + (row.scores[1]*1);
                    row.mean = row.totalN > 0 ? sum / row.totalN : 0;

                    const sumSq = (row.scores[5]*25) + (row.scores[4]*16) + (row.scores[3]*9) + (row.scores[2]*4) + (row.scores[1]*1);
                    const variance = row.totalN > 1 ? (sumSq - (row.totalN * row.mean * row.mean)) / (row.totalN - 1) : 0;
                    row.sd = Math.sqrt(variance);

                    row.percentage = (row.mean / 5) * 100;

                    if (row.mean >= 4.50) row.interpret = 'มากที่สุด';
                    else if (row.mean >= 3.50) row.interpret = 'มาก';
                    else if (row.mean >= 2.50) row.interpret = 'ปานกลาง';
                    else if (row.mean >= 1.50) row.interpret = 'ค่อนข้างน้อย';
                    else row.interpret = 'น้อย';

                    return row;
                });

                // Calculate Pooled Category Means and Summaries (คำนวณค่าเฉลี่ยรายด้านและสรุปรายด้านจากข้อมูลรวมก้อนเดียว)
                const pooledCategoryStats = {};
                const aggregatedCategorySummary = {};
                const categoriesList = ['ด้านผลิตภัณฑ์', 'ด้านกระบวนการบริการ', 'ด้านการส่งเสริมการใช้งาน', 'ด้านความพึงพอใจภาพรวม'];
                
                categoriesList.forEach(cat => {
                    let catTotalSum = 0;
                    let catTotalN = 0;
                    
                    const summary = { scores: {5:0, 4:0, 3:0, 2:0, 1:0}, totalN: 0, mean: 0, sd: 0, percentage: 0, interpret: '' };

                    aggregatedTable.forEach(row => {
                        if (row.category === cat) {
                            const sum = (row.scores[5]*5) + (row.scores[4]*4) + (row.scores[3]*3) + (row.scores[2]*2) + (row.scores[1]*1);
                            catTotalSum += sum;
                            catTotalN += row.totalN;

                            // Accumulate for summary
                            summary.scores[5] += row.scores[5];
                            summary.scores[4] += row.scores[4];
                            summary.scores[3] += row.scores[3];
                            summary.scores[2] += row.scores[2];
                            summary.scores[1] += row.scores[1];
                            summary.totalN += row.totalN;
                        }
                    });
                    
                    pooledCategoryStats[cat] = catTotalN > 0 ? catTotalSum / catTotalN : 0;

                    // Finalize summary stats
                    if (summary.totalN > 0) {
                        summary.mean = catTotalN > 0 ? catTotalSum / catTotalN : 0;
                        const sumSq = (summary.scores[5]*25) + (summary.scores[4]*16) + (summary.scores[3]*9) + (summary.scores[2]*4) + (summary.scores[1]*1);
                        const variance = summary.totalN > 1 ? (sumSq - (summary.totalN * summary.mean * summary.mean)) / (summary.totalN - 1) : 0;
                        summary.sd = Math.sqrt(variance);
                        summary.percentage = (summary.mean / 5) * 100;
                    }
                    if (summary.mean >= 4.50) summary.interpret = 'มากที่สุด';
                    else if (summary.mean >= 3.50) summary.interpret = 'มาก';
                    else if (summary.mean >= 2.50) summary.interpret = 'ปานกลาง';
                    else if (summary.mean >= 1.50) summary.interpret = 'ค่อนข้างน้อย';
                    else summary.interpret = 'น้อย';

                    aggregatedCategorySummary[cat] = summary;
                });

                // 3. Prepare Data for Comparison Table (Question vs Years)
                const comparisonTable = questionsConfig.map((q, idx) => {
                    const row = { id: q.id, text: q.text, category: q.category };
                    
                    availableYears.forEach(year => {
                        const s = rawData[year].scores[q.id];
                        row[year] = calculateMean(s, rawData[year].respondents);
                    });
                    
                    // ใช้ค่าเฉลี่ยแบบ Pooled (ภาพรวมรวมกันจริงๆ) จาก aggregatedTable แทนการเอาค่าเฉลี่ยมาเฉลี่ยกัน
                    row['average'] = aggregatedTable[idx].mean;
                    return row;
                });

                // 4. Overall Summary Stats
                const totalRespondents = availableYears.reduce((sum, y) => sum + rawData[y].respondents, 0);
                
                // คำนวณค่าเฉลี่ยรวมทุกปีแบบ Pooled พร้อมสร้างข้อมูล Grand Total Summary
                const grandTotalSummary = { scores: {5:0, 4:0, 3:0, 2:0, 1:0}, totalN: 0, mean: 0, sd: 0, percentage: 0, interpret: '' };
                let grandTotalSum = 0;
                
                aggregatedTable.forEach(row => {
                    const sum = (row.scores[5]*5) + (row.scores[4]*4) + (row.scores[3]*3) + (row.scores[2]*2) + (row.scores[1]*1);
                    grandTotalSum += sum;
                    
                    grandTotalSummary.scores[5] += row.scores[5];
                    grandTotalSummary.scores[4] += row.scores[4];
                    grandTotalSummary.scores[3] += row.scores[3];
                    grandTotalSummary.scores[2] += row.scores[2];
                    grandTotalSummary.scores[1] += row.scores[1];
                    grandTotalSummary.totalN += row.totalN;
                });

                if (grandTotalSummary.totalN > 0) {
                    grandTotalSummary.mean = grandTotalSum / grandTotalSummary.totalN;
                    const sumSq = (grandTotalSummary.scores[5]*25) + (grandTotalSummary.scores[4]*16) + (grandTotalSummary.scores[3]*9) + (grandTotalSummary.scores[2]*4) + (grandTotalSummary.scores[1]*1);
                    const variance = grandTotalSummary.totalN > 1 ? (sumSq - (grandTotalSummary.totalN * grandTotalSummary.mean * grandTotalSummary.mean)) / (grandTotalSummary.totalN - 1) : 0;
                    grandTotalSummary.sd = Math.sqrt(variance);
                    grandTotalSummary.percentage = (grandTotalSummary.mean / 5) * 100;
                }

                if (grandTotalSummary.mean >= 4.50) grandTotalSummary.interpret = 'มากที่สุด';
                else if (grandTotalSummary.mean >= 3.50) grandTotalSummary.interpret = 'มาก';
                else if (grandTotalSummary.mean >= 2.50) grandTotalSummary.interpret = 'ปานกลาง';
                else if (grandTotalSummary.mean >= 1.50) grandTotalSummary.interpret = 'ค่อนข้างน้อย';
                else grandTotalSummary.interpret = 'น้อย';

                const pooledOverallMean = grandTotalSummary.mean;

                return { 
                    trendData, comparisonTable, aggregatedTable, 
                    totalRespondents, pooledOverallMean, availableYears, 
                    pooledCategoryStats, aggregatedCategorySummary, grandTotalSummary 
                };
            }, []);

            // --- UI Sub-Components ---
            const StatCard = ({ title, value, subtext, icon: Icon, colorClass }) => (
                <div className="bg-white rounded-xl shadow-sm p-6 border border-slate-100 flex items-start justify-between hover:shadow-md transition-shadow">
                    <div>
                        <p className="text-sm font-medium text-slate-500 mb-1">{title}</p>
                        <h3 className="text-2xl font-bold text-slate-800">{value}</h3>
                        {subtext && <p className="text-xs text-slate-400 mt-1">{subtext}</p>}
                    </div>
                    <div className={`p-3 rounded-lg ${colorClass}`}>
                        <Icon className="w-6 h-6 text-white" />
                    </div>
                </div>
            );

            // Function to render table rows grouped by category
            const renderGroupedRows = (statsArray, columnsType = 'yearly') => {
                 const categories = ['ด้านผลิตภัณฑ์', 'ด้านกระบวนการบริการ', 'ด้านการส่งเสริมการใช้งาน', 'ด้านความพึงพอใจภาพรวม'];
                 
                 return categories.map(cat => {
                    const itemsInCat = statsArray.filter(item => item.category === cat);
                    
                    return (
                        <React.Fragment key={cat}>
                            {/* Category Header Row */}
                            <tr className="bg-slate-100 border-b border-slate-200">
                                <td colSpan={columnsType === 'aggregated' ? 12 : (columnsType === 'yearly' ? 7 : 3 + overviewStats.availableYears.length)} className="p-3 font-bold text-slate-700">
                                    {cat}
                                </td>
                            </tr>
                            {/* Items Rows */}
                            {itemsInCat.map((item, idx) => {
                                if (columnsType === 'yearly') {
                                    return (
                                        <tr key={item.id} className="hover:bg-slate-50 border-b last:border-0 text-sm">
                                            <td className="p-4 font-medium text-slate-500 pl-8">{item.id}</td>
                                            <td className="p-4">
                                                <span className="text-slate-800 block font-medium">{item.text}</span>
                                            </td>
                                            <td className="p-4 text-center text-emerald-600 font-medium bg-emerald-50/50">
                                                {item.breakdown[5]}
                                            </td>
                                            <td className="p-4 text-center text-blue-600 font-medium bg-blue-50/50">
                                                {item.breakdown[4]}
                                            </td>
                                            <td className="p-4 text-center font-bold text-slate-700">
                                                {item.mean.toFixed(2)}
                                            </td>
                                            <td className="p-4 text-center text-slate-500">
                                                {item.sd.toFixed(2)}
                                            </td>
                                            <td className="p-4 text-center">
                                                <span className={`px-3 py-1 rounded-full text-xs font-semibold
                                                    ${item.mean >= 4.5 ? 'bg-emerald-100 text-emerald-700' : 'bg-blue-100 text-blue-700'}
                                                `}>
                                                    {item.interpret}
                                                </span>
                                            </td>
                                        </tr>
                                    );
                                } else if (columnsType === 'aggregated') {
                                    return (
                                        <tr key={item.id} className="hover:bg-slate-50 border-b last:border-0 text-sm">
                                            <td className="p-4 font-medium text-slate-500 pl-8">{item.id}</td>
                                            <td className="p-4">
                                                <span className="text-slate-800 block font-medium">{item.text}</span>
                                            </td>
                                            <td className="p-4 text-center text-emerald-600 bg-emerald-50/50">{item.scores[5]}</td>
                                            <td className="p-4 text-center text-blue-600 bg-blue-50/50">{item.scores[4]}</td>
                                            <td className="p-4 text-center text-slate-500">{item.scores[3]}</td>
                                            <td className="p-4 text-center text-slate-500">{item.scores[2]}</td>
                                            <td className="p-4 text-center text-slate-500">{item.scores[1]}</td>
                                            <td className="p-4 text-center font-bold text-slate-700 bg-slate-50">{item.totalN}</td>
                                            <td className="p-4 text-center font-bold text-indigo-600">{item.percentage.toFixed(2)}%</td>
                                            <td className="p-4 text-center font-bold text-slate-800">{item.mean.toFixed(2)}</td>
                                            <td className="p-4 text-center text-slate-500">{item.sd.toFixed(2)}</td>
                                            <td className="p-4 text-center">
                                                <span className={`px-3 py-1 rounded-full text-xs font-semibold
                                                    ${item.mean >= 4.5 ? 'bg-emerald-100 text-emerald-700' : 'bg-blue-100 text-blue-700'}
                                                `}>
                                                    {item.interpret}
                                                </span>
                                            </td>
                                        </tr>
                                    );
                                } else {
                                     // For Comparison Table
                                     return (
                                        <tr key={item.id} className="hover:bg-slate-50 border-b last:border-0 text-sm">
                                            <td className="p-4 font-medium text-slate-500 pl-8">{item.id}</td>
                                            <td className="p-4">
                                                <span className="text-slate-800 block font-medium">{item.text}</span>
                                            </td>
                                            {overviewStats.availableYears.map(y => (
                                                <td key={y} className="p-4 text-center font-medium text-slate-600">
                                                    {item[y].toFixed(2)}
                                                </td>
                                            ))}
                                            <td className="p-4 text-center font-bold text-blue-700 bg-blue-50/30">
                                                {item.average.toFixed(2)}
                                            </td>
                                        </tr>
                                    );
                                }
                            })}

                            {/* Summary Row for Aggregated View (สรุปรวมแต่ละด้าน) */}
                            {columnsType === 'aggregated' && overviewStats.aggregatedCategorySummary[cat] && (
                                <tr className="bg-blue-50/60 border-b-2 border-blue-200 text-sm font-bold">
                                    <td colSpan="2" className="p-4 text-right text-blue-900">
                                        รวม{cat}
                                    </td>
                                    <td className="p-4 text-center text-blue-900">{overviewStats.aggregatedCategorySummary[cat].scores[5]}</td>
                                    <td className="p-4 text-center text-blue-900">{overviewStats.aggregatedCategorySummary[cat].scores[4]}</td>
                                    <td className="p-4 text-center text-blue-900">{overviewStats.aggregatedCategorySummary[cat].scores[3]}</td>
                                    <td className="p-4 text-center text-blue-900">{overviewStats.aggregatedCategorySummary[cat].scores[2]}</td>
                                    <td className="p-4 text-center text-blue-900">{overviewStats.aggregatedCategorySummary[cat].scores[1]}</td>
                                    <td className="p-4 text-center text-blue-900">{overviewStats.aggregatedCategorySummary[cat].totalN}</td>
                                    <td className="p-4 text-center text-indigo-700">{overviewStats.aggregatedCategorySummary[cat].percentage.toFixed(2)}%</td>
                                    <td className="p-4 text-center text-blue-900">{overviewStats.aggregatedCategorySummary[cat].mean.toFixed(2)}</td>
                                    <td className="p-4 text-center text-blue-900">{overviewStats.aggregatedCategorySummary[cat].sd.toFixed(2)}</td>
                                    <td className="p-4 text-center">
                                        <span className={`px-3 py-1 rounded-full text-xs font-black
                                            ${overviewStats.aggregatedCategorySummary[cat].mean >= 4.5 ? 'bg-emerald-200 text-emerald-800' : 'bg-blue-200 text-blue-800'}
                                        `}>
                                            {overviewStats.aggregatedCategorySummary[cat].interpret}
                                        </span>
                                    </td>
                                </tr>
                            )}
                        </React.Fragment>
                    );
                 });
            };


            return (
                <div className="min-h-screen bg-slate-50 font-sans pb-12">
                    {/* Main Header */}
                    <div className="bg-white border-b border-slate-200 sticky top-0 z-20 shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-blue-600 p-2 rounded-lg">
                                    <IconSmartphone className="w-6 h-6 text-white" />
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold text-slate-800">รายงานผลความพึงพอใจ</h1>
                                    <p className="text-sm text-slate-500">ศูนย์พัฒนาเด็กเล็กเทศบาลตำบลหัวดง</p>
                                </div>
                            </div>
                            
                            {/* View Switcher */}
                            <div className="flex bg-slate-100 p-1 rounded-lg flex-wrap justify-center gap-1 mt-4 md:mt-0">
                                <button
                                    onClick={() => setViewMode('year')}
                                    className={`px-4 py-2 rounded-md text-sm font-medium transition-all flex items-center gap-2 ${
                                        viewMode === 'year' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'
                                    }`}
                                >
                                    <IconBookOpen className="w-4 h-4" /> รายปีการศึกษา
                                </button>
                                <button
                                    onClick={() => setViewMode('overview')}
                                    className={`px-4 py-2 rounded-md text-sm font-medium transition-all flex items-center gap-2 ${
                                        viewMode === 'overview' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'
                                    }`}
                                >
                                    <IconPieChart className="w-4 h-4" /> ภาพรวมเปรียบเทียบ
                                </button>
                                <button
                                    onClick={() => setViewMode('assessment')}
                                    className={`px-4 py-2 rounded-md text-sm font-medium transition-all flex items-center gap-2 ${
                                        viewMode === 'assessment' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'
                                    }`}
                                >
                                    <IconClipboardList className="w-4 h-4" /> ทำแบบประเมิน
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-8">
                        
                        {/* --- VIEW MODE: YEARLY --- */}
                        {viewMode === 'year' && (
                            <>
                                {/* Year Selector */}
                                <div className="flex justify-end">
                                    <div className="flex items-center gap-2 bg-white p-2 rounded-lg shadow-sm border border-slate-200">
                                        <span className="text-sm text-slate-500 ml-2">เลือกปีการศึกษา:</span>
                                        {['2564', '2565', '2566', '2567'].map((year) => (
                                            <button
                                                key={year}
                                                onClick={() => setSelectedYear(year)}
                                                className={`px-3 py-1.5 rounded-md text-sm font-medium transition-all ${
                                                    selectedYear === year 
                                                        ? 'bg-blue-100 text-blue-700' 
                                                        : 'text-slate-500 hover:bg-slate-50'
                                                }`}
                                            >
                                                {year}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {yearlyStats ? (
                                    <>
                                        {/* Overview Cards */}
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                            <StatCard 
                                                title="จำนวนผู้ตอบแบบสอบถาม" 
                                                value={`${yearlyStats.respondents} คน`} 
                                                subtext={`ปีการศึกษา ${selectedYear}`}
                                                icon={IconUsers}
                                                colorClass="bg-blue-500"
                                            />
                                            <StatCard 
                                                title="ค่าเฉลี่ยรวมทุกด้าน" 
                                                value={yearlyStats.overallMean.toFixed(2)} 
                                                subtext="จากคะแนนเต็ม 5.00"
                                                icon={IconActivity}
                                                colorClass="bg-emerald-500"
                                            />
                                            <StatCard 
                                                title="ระดับความพึงพอใจ" 
                                                value={yearlyStats.overallMean >= 4.5 ? 'มากที่สุด' : 'มาก'} 
                                                subtext="แปลผลจากค่าเฉลี่ยรวม"
                                                icon={IconStar}
                                                colorClass="bg-amber-500"
                                            />
                                            <StatCard 
                                                title="สถานะข้อมูล" 
                                                value="สมบูรณ์" 
                                                subtext="พร้อมสำหรับการวิเคราะห์"
                                                icon={IconFileText}
                                                colorClass="bg-indigo-500"
                                            />
                                        </div>

                                        {/* Charts */}
                                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                            <div className="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                                                <h3 className="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                                                    <IconTrendingUp className="w-5 h-5 text-blue-600" />
                                                    สรุปผลรายด้าน (ค่าเฉลี่ย)
                                                </h3>
                                                <div className="h-80">
                                                    <ResponsiveContainer width="100%" height="100%">
                                                        <BarChart data={yearlyStats.categoryStats} layout="vertical" margin={{ left: 40, right: 20, bottom: 20 }}>
                                                            <CartesianGrid strokeDasharray="3 3" horizontal={false} />
                                                            <XAxis type="number" domain={[0, 5]} hide />
                                                            <YAxis dataKey="name" type="category" width={150} tick={{fontSize: 12}} />
                                                            <Tooltip formatter={(value) => value.toFixed(2)} cursor={{fill: 'transparent'}} />
                                                            <Bar dataKey="avg" name="คะแนนเฉลี่ย" radius={[0, 4, 4, 0]} barSize={30}>
                                                                {yearlyStats.categoryStats.map((entry, index) => (
                                                                    <Cell key={`cell-${index}`} fill={COLORS[entry.name]} />
                                                                ))}
                                                            </Bar>
                                                        </BarChart>
                                                    </ResponsiveContainer>
                                                </div>
                                            </div>
                                            
                                            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                                                <h3 className="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                                                    <IconActivity className="w-5 h-5 text-purple-600" />
                                                    แผนภาพเรดาร์
                                                </h3>
                                                <div className="h-80">
                                                    <ResponsiveContainer width="100%" height="100%">
                                                        <RadarChart cx="50%" cy="50%" outerRadius="80%" data={yearlyStats.categoryStats}>
                                                            <PolarGrid />
                                                            <PolarAngleAxis dataKey="name" tick={{ fontSize: 10 }} />
                                                            <PolarRadiusAxis angle={30} domain={[0, 5]} />
                                                            <Radar name="คะแนนเฉลี่ย" dataKey="avg" stroke="#4F46E5" fill="#4F46E5" fillOpacity={0.6} />
                                                            <Tooltip formatter={(value) => value.toFixed(2)} />
                                                        </RadarChart>
                                                    </ResponsiveContainer>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Detailed Table (Yearly) */}
                                        <div className="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                                            <div className="p-6 border-b border-slate-100">
                                                <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                                                    <IconFileText className="w-5 h-5 text-slate-600" />
                                                    รายละเอียดรายข้อ (Mean & S.D.)
                                                </h3>
                                            </div>
                                            <div className="overflow-x-auto">
                                                <table className="w-full text-left border-collapse">
                                                    <thead>
                                                        <tr className="bg-slate-50 text-slate-600 text-sm font-semibold">
                                                            <th className="p-4 border-b">ข้อ</th>
                                                            <th className="p-4 border-b">ประเด็นการประเมิน</th>
                                                            <th className="p-4 border-b text-center w-32">ระดับ 5 (คน)</th>
                                                            <th className="p-4 border-b text-center w-32">ระดับ 4 (คน)</th>
                                                            <th className="p-4 border-b text-center w-24">Mean</th>
                                                            <th className="p-4 border-b text-center w-24">S.D.</th>
                                                            <th className="p-4 border-b text-center w-32">แปลผล</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {renderGroupedRows(yearlyStats.itemStats, 'yearly')}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </>
                                ) : (
                                    <div className="flex flex-col items-center justify-center py-20 bg-white rounded-xl border border-dashed border-slate-300">
                                        <div className="bg-slate-100 p-4 rounded-full mb-4">
                                            <IconBookOpen className="w-10 h-10 text-slate-400" />
                                        </div>
                                        <h3 className="text-xl font-bold text-slate-700">ไม่พบข้อมูลปีการศึกษา {selectedYear}</h3>
                                        <p className="text-slate-500 mt-2">ยังไม่มีการบันทึกข้อมูลแบบสอบถามสำหรับปีการศึกษานี้</p>
                                    </div>
                                )}
                            </>
                        )}

                        {/* --- VIEW MODE: OVERVIEW --- */}
                        {viewMode === 'overview' && (
                            <>
                                {/* Overview Title / Header */}
                                <div className="bg-gradient-to-r from-blue-600 to-indigo-600 rounded-xl shadow-md p-6 mb-6 text-white text-center">
                                    <h2 className="text-xl md:text-2xl font-bold">ภาพรวมผลการประเมินความพึงพอใจต่อการใช้งาน</h2>
                                    <p className="text-blue-100 mt-2 text-sm md:text-base">ตั้งแต่วันที่ 1 พฤศจิกายน 2566 – 15 พฤษภาคม 2568</p>
                                </div>

                                {/* Overview Cards */}
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <StatCard 
                                        title={`จำนวนผู้ตอบสะสม (${overviewStats.availableYears.length} ปี)`} 
                                        value={`${overviewStats.totalRespondents} คน`} 
                                        subtext={`ตั้งแต่ปี ${overviewStats.availableYears[0]} - ${overviewStats.availableYears[overviewStats.availableYears.length - 1]}`}
                                        icon={IconUsers}
                                        colorClass="bg-purple-500"
                                    />
                                    <StatCard 
                                        title="ค่าเฉลี่ยรวมทุกปี" 
                                        value={overviewStats.pooledOverallMean.toFixed(2)} 
                                        subtext="คำนวณจากข้อมูลรวมทั้งหมด (Pooled)"
                                        icon={IconActivity}
                                        colorClass="bg-indigo-500"
                                    />
                                    <StatCard 
                                        title={`แนวโน้มล่าสุด (${overviewStats.availableYears[overviewStats.availableYears.length - 1]})`} 
                                        value={overviewStats.trendData[overviewStats.trendData.length-1]['ภาพรวม'].toFixed(2)}
                                        subtext="เทียบกับปีก่อนหน้า"
                                        icon={IconTrendingUp}
                                        colorClass="bg-emerald-500"
                                    />
                                </div>

                                {/* 1. Main Overall Trend Chart */}
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                                    <h3 className="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                                        <IconTrendingUp className="w-5 h-5 text-amber-500" />
                                        แนวโน้มความพึงพอใจ "ภาพรวม" (ทุกด้านรวมกัน)
                                    </h3>
                                    <div className="h-80">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <LineChart data={overviewStats.trendData} margin={{ top: 5, right: 30, left: 0, bottom: 5 }}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                                <XAxis dataKey="year" />
                                                <YAxis domain={[3.5, 5]} />
                                                <Tooltip 
                                                    formatter={(value) => value.toFixed(2)}
                                                    contentStyle={{ backgroundColor: '#fff', borderRadius: '8px', border: '1px solid #e2e8f0' }}
                                                />
                                                <Legend wrapperStyle={{ paddingTop: '20px' }} />
                                                <Line 
                                                    type="monotone" 
                                                    dataKey="ภาพรวม" 
                                                    stroke="#F59E0B" 
                                                    strokeWidth={4} 
                                                    dot={{ r: 6, fill: '#F59E0B', strokeWidth: 2, stroke: '#fff' }} 
                                                    activeDot={{ r: 8 }}
                                                    name="คะแนนภาพรวม" 
                                                />
                                            </LineChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>

                                {/* 2. Category Pooled Mean Cards (แยกรายด้านแบบภาพรวม) */}
                                <div>
                                    <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                                        <IconPieChart className="w-5 h-5 text-blue-600" />
                                        สรุปค่าเฉลี่ยแยกรายด้าน (รวมข้อมูลปี {overviewStats.availableYears[0]} - {overviewStats.availableYears[overviewStats.availableYears.length - 1]})
                                    </h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                        {['ด้านผลิตภัณฑ์', 'ด้านกระบวนการบริการ', 'ด้านการส่งเสริมการใช้งาน', 'ด้านความพึงพอใจภาพรวม'].map((cat) => (
                                            <div key={cat} className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow flex flex-col items-center justify-center">
                                                <h4 className="text-sm font-bold text-slate-700 mb-4 text-center">
                                                    {cat}
                                                </h4>
                                                
                                                <div className="text-center mb-2">
                                                    <span className="text-4xl font-black" style={{ color: COLORS[cat] }}>
                                                        {overviewStats.pooledCategoryStats[cat].toFixed(2)}
                                                    </span>
                                                    <span className="text-slate-400 ml-1 font-medium">/ 5.00</span>
                                                </div>
                                                
                                                {/* Progress Bar indicating score */}
                                                <div className="w-full bg-slate-100 rounded-full h-2.5 mt-2">
                                                    <div 
                                                        className="h-2.5 rounded-full" 
                                                        style={{ width: `${(overviewStats.pooledCategoryStats[cat] / 5) * 100}%`, backgroundColor: COLORS[cat] }}
                                                    ></div>
                                                </div>
                                                
                                                <p className="text-xs text-slate-500 mt-4 bg-slate-50 px-3 py-1 rounded-full border border-slate-200">
                                                    คำนวณจากข้อมูลดิบรวม {overviewStats.availableYears.length} ปี
                                                </p>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Aggregated Statistics Table */}
                                <div className="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden mt-6">
                                    <div className="p-6 border-b border-slate-100">
                                        <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                                            <IconClipboardList className="w-5 h-5 text-indigo-600" />
                                            สรุปรายละเอียดจำนวนผู้ตอบสะสมรายข้อ (รวมข้อมูลปี {overviewStats.availableYears[0]} - {overviewStats.availableYears[overviewStats.availableYears.length - 1]})
                                        </h3>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left border-collapse min-w-[1000px]">
                                            <thead>
                                                <tr className="bg-slate-50 text-slate-600 text-xs md:text-sm font-semibold">
                                                    <th className="p-3 border-b w-12">ข้อ</th>
                                                    <th className="p-3 border-b min-w-[200px]">ประเด็นการประเมิน</th>
                                                    <th className="p-3 border-b text-center w-16" title="ระดับ 5">5</th>
                                                    <th className="p-3 border-b text-center w-16" title="ระดับ 4">4</th>
                                                    <th className="p-3 border-b text-center w-16" title="ระดับ 3">3</th>
                                                    <th className="p-3 border-b text-center w-16" title="ระดับ 2">2</th>
                                                    <th className="p-3 border-b text-center w-16" title="ระดับ 1">1</th>
                                                    <th className="p-3 border-b text-center w-20">รวม (คน)</th>
                                                    <th className="p-3 border-b text-center w-20">ร้อยละ</th>
                                                    <th className="p-3 border-b text-center w-20">Mean</th>
                                                    <th className="p-3 border-b text-center w-20">S.D.</th>
                                                    <th className="p-3 border-b text-center w-24">แปลผล</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {renderGroupedRows(overviewStats.aggregatedTable, 'aggregated')}
                                                {/* Grand Total Row (สรุปรวมความพึงพอใจทุกด้าน) */}
                                                <tr className="bg-indigo-100 border-t-4 border-indigo-300 text-sm font-black">
                                                    <td colSpan="2" className="p-4 text-center text-indigo-900 text-base uppercase">
                                                        สรุปรวมความพึงพอใจทุกด้าน
                                                    </td>
                                                    <td className="p-4 text-center text-indigo-900">{overviewStats.grandTotalSummary.scores[5]}</td>
                                                    <td className="p-4 text-center text-indigo-900">{overviewStats.grandTotalSummary.scores[4]}</td>
                                                    <td className="p-4 text-center text-indigo-900">{overviewStats.grandTotalSummary.scores[3]}</td>
                                                    <td className="p-4 text-center text-indigo-900">{overviewStats.grandTotalSummary.scores[2]}</td>
                                                    <td className="p-4 text-center text-indigo-900">{overviewStats.grandTotalSummary.scores[1]}</td>
                                                    <td className="p-4 text-center text-indigo-900">{overviewStats.grandTotalSummary.totalN}</td>
                                                    <td className="p-4 text-center text-indigo-700">{overviewStats.grandTotalSummary.percentage.toFixed(2)}%</td>
                                                    <td className="p-4 text-center text-indigo-900">{overviewStats.grandTotalSummary.mean.toFixed(2)}</td>
                                                    <td className="p-4 text-center text-indigo-900">{overviewStats.grandTotalSummary.sd.toFixed(2)}</td>
                                                    <td className="p-4 text-center">
                                                        <span className={`px-4 py-1.5 rounded-full text-xs font-black shadow-sm
                                                            ${overviewStats.grandTotalSummary.mean >= 4.5 ? 'bg-emerald-500 text-white' : 'bg-blue-500 text-white'}
                                                        `}>
                                                            {overviewStats.grandTotalSummary.interpret}
                                                        </span>
                                                    </td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </>
                        )}

                        {/* --- VIEW MODE: ASSESSMENT --- */}
                        {viewMode === 'assessment' && (
                            <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-8 md:p-16 text-center max-w-4xl mx-auto my-4 md:my-8">
                                <div className="bg-blue-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <IconClipboardList className="w-12 h-12 text-blue-600" />
                                </div>
                                
                                <h2 className="text-2xl md:text-3xl font-bold text-slate-800 mb-3">
                                    แบบประเมินความพึงพอใจต่อการใช้งานแอปพลิเคชัน
                                </h2>
                                <h3 className="text-xl md:text-2xl font-bold text-blue-600 mb-8">
                                    ประจำปีการศึกษา 2568
                                </h3>
                                
                                <p className="text-slate-600 mb-10 text-base md:text-lg leading-relaxed max-w-2xl mx-auto">
                                    ศูนย์พัฒนาเด็กเล็กเทศบาลตำบลหัวดง ขอความร่วมมือจากผู้ปกครองและครูทุกท่าน ร่วมตอบแบบประเมินความพึงพอใจ 
                                    เพื่อนำข้อมูลและข้อเสนอแนะที่ได้ไปใช้เป็นแนวทางในการปรับปรุงและพัฒนาแอปพลิเคชันให้มีประสิทธิภาพ 
                                    และตอบสนองต่อการใช้งานของท่านให้ดียิ่งขึ้น
                                </p>

                                {/* ส่วนเกณฑ์การประเมิน */}
                                <div className="bg-slate-50 rounded-xl p-6 md:p-8 text-left mb-10 max-w-3xl mx-auto border border-slate-200">
                                    <h4 className="text-lg font-bold text-slate-800 mb-3 flex items-center gap-2">
                                        <IconActivity className="w-5 h-5 text-indigo-600" />
                                        เกณฑ์การวิเคราะห์ข้อมูลและการแปลความหมาย
                                    </h4>
                                    <p className="text-slate-600 mb-6 text-sm md:text-base">
                                        สำหรับการวิเคราะห์ข้อมูลความพึงพอใจใช้ค่าสถิติ โดยการนําค่าร้อยละ มาเป็นตัววิเคราะห์ข้อมูลความพึงพอใจ ตามเกณฑ์ดังนี้
                                    </p>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-0">
                                        {/* ระดับคะแนน */}
                                        <div className="md:pr-8 md:border-r md:border-slate-200">
                                            <h5 className="font-bold text-slate-700 mb-3 text-sm md:text-base border-b border-slate-200 pb-2">ระดับความพึงพอใจ</h5>
                                            <ul className="text-sm md:text-base text-slate-600 space-y-2">
                                                <li className="flex justify-between"><span>มากที่สุด</span> <span className="font-medium">5 คะแนน</span></li>
                                                <li className="flex justify-between"><span>มาก</span> <span className="font-medium">4 คะแนน</span></li>
                                                <li className="flex justify-between"><span>ปานกลาง</span> <span className="font-medium">3 คะแนน</span></li>
                                                <li className="flex justify-between"><span>น้อย</span> <span className="font-medium">2 คะแนน</span></li>
                                                <li className="flex justify-between"><span>น้อยที่สุด</span> <span className="font-medium">1 คะแนน</span></li>
                                            </ul>
                                        </div>
                                        
                                        {/* การแปลผล */}
                                        <div className="md:pl-8 pt-6 md:pt-0 border-t md:border-t-0 border-slate-200">
                                            <h5 className="font-bold text-slate-700 mb-3 text-sm md:text-base border-b border-slate-200 pb-2">การแปลความหมายจากค่าเฉลี่ย</h5>
                                            <ul className="text-sm md:text-base text-slate-600 space-y-2">
                                                <li className="flex justify-between"><span>4.50 – 5.00</span> <span className="font-medium">มีความพึงพอใจมากที่สุด</span></li>
                                                <li className="flex justify-between"><span>3.50 – 4.49</span> <span className="font-medium">มีความพึงพอใจมาก</span></li>
                                                <li className="flex justify-between"><span>2.50 – 3.49</span> <span className="font-medium">มีความพึงพอใจปานกลาง</span></li>
                                                <li className="flex justify-between"><span>1.50 – 2.49</span> <span className="font-medium">มีความพึงพอใจค่อนข้างน้อย</span></li>
                                                <li className="flex justify-between"><span>1.00 – 1.49</span> <span className="font-medium">มีความพึงพอใจน้อย</span></li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                                
                                <a 
                                    href="https://gornphet.github.io/app_Satisfaction2/" 
                                    target="_blank" 
                                    rel="noopener noreferrer"
                                    className="inline-flex items-center justify-center gap-3 bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-8 py-4 rounded-xl font-bold text-lg shadow-md hover:from-blue-700 hover:to-indigo-700 transition-all hover:shadow-lg transform hover:-translate-y-1"
                                >
                                    คลิกเพื่อทำแบบประเมินออนไลน์ <IconLink className="w-6 h-6" />
                                </a>
                                
                                <p className="text-sm text-slate-400 mt-8">
                                    ใช้เวลาในการทำแบบประเมินประมาณ 3-5 นาที ขอบคุณที่ให้ความร่วมมือครับ/ค่ะ
                                </p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
